resolver 8.8.8.8 valid=300s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to the Google Apps Script feedback endpoint, same-origin so no CSP change is needed.
    # $feedback_upstream (not a literal in proxy_pass) makes nginx re-resolve it via `resolver` above.
    location /feedback/ {
        set $feedback_upstream "${FEEDBACK_SCRIPT_URL}";
        proxy_pass $feedback_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host script.google.com;
        proxy_intercept_errors on;
        error_page 302 = @feedback_redirect;
    }

    location @feedback_redirect {
        if ($upstream_http_location !~ "^https://script\.googleusercontent\.com/") {
            return 502;
        }
        add_header Content-Type application/json always;
        return 200 '{"status":"ok"}';
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
